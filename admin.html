<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء - نظام المنيو (Cloudflare)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #f26d21;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .clients-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #0f3460;
        }

        .clients-section h2 {
            color: #4ecca3;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .client-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .client-info h3 {
            color: #f26d21;
            font-size: 16px;
        }

        .client-info p {
            color: #aaa;
            font-size: 13px;
            margin-top: 4px;
        }

        .client-domains {
            color: #4ecca3;
            font-size: 12px;
            margin-top: 4px;
        }

        .edit-btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 5px;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .add-section {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            border: 2px solid #f26d21;
        }

        .add-section h2 {
            color: #f26d21;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-group label {
            color: #4ecca3;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input {
            background: #0f3460;
            border: 1px solid #1a4a7a;
            color: #eee;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input[dir="rtl"] {
            text-align: right;
        }

        .form-group input[dir="ltr"] {
            text-align: left;
            direction: ltr;
        }

        .hint {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
        }

        .clear-btn {
            background: #333;
            color: #eee;
            border: 1px solid #555;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            display: none;
            z-index: 1000;
        }

        .toast.success {
            background: #4ecca3;
            color: #1a1a2e;
            display: block;
        }

        .toast.error {
            background: #e74c3c;
            color: white;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 إدارة العملاء (Cloudflare)</h1>
        <p class="subtitle">النظام المبسط لإضافة العملاء وتعديلهم</p>

        <div class="clients-section">
            <h2>📋 العملاء الحاليين</h2>
            <div id="clientsList">جاري التحميل...</div>
        </div>

        <div class="add-section">
            <h2>➕ إضافة / تعديل عميل</h2>
            <div class="form-group">
                <label>🔑 معرف العميل بالانجليزي (ID)</label>
                <input type="text" id="clientId" dir="ltr" placeholder="thejuicytaste"
                    style="text-transform: lowercase;">
                <span class="hint">حروف انجليزية، أرقام وشرطات فقط.</span>
            </div>
            <div class="form-group">
                <label>🏪 اسم المحل (بالعربي)</label>
                <input type="text" id="clientName" dir="rtl" placeholder="مطعم الكوخ">
            </div>
            <div class="form-group">
                <label>🌐 دومينات العميل (مفصولة بفاصلة)</label>
                <input type="text" id="clientDomains" dir="ltr" placeholder="menu.com, test.pages.dev">
            </div>
            <div class="form-group">
                <label>💳 مفتاح النشر - ميسر (اختياري)</label>
                <input type="text" id="moyasarKey" dir="ltr" placeholder="pk_test_...">
            </div>
            <div class="btn-row">
                <button class="save-btn" onclick="saveClient()">💾 حفظ العميل وتحديث الملفات</button>
                <button class="clear-btn" onclick="clearForm()">🗑️ مسح النموذج</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let clientsData = {};

        function loadClients() {
            fetch('clients.json?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    // دعم الصيغة القديمة والجديدة
                    clientsData = data.clients || data;
                    renderClients();
                })
                .catch(err => {
                    console.error("Error loading clients", err);
                    document.getElementById('clientsList').innerHTML = '<p style="color:#e74c3c;">❌ لا يوجد ملف clients.json أو أنه فارغ</p>';
                });
        }

        function renderClients() {
            const container = document.getElementById('clientsList');
            const keys = Object.keys(clientsData);

            if (keys.length === 0) {
                container.innerHTML = '<p style="color:#888;">لا يوجد عملاء حاليا</p>';
                return;
            }

            let html = '';
            keys.forEach(id => {
                const client = clientsData[id];
                const hasM = client.moyasarPublishableKey ? '<span style="color:#f39c12; font-size:12px;">✅ ميسر مفعل</span>' : '';
                const domains = (client.domains || []).join(' | ');

                html += '<div class="client-card">';
                html += '  <div class="client-info">';
                html += '    <h3>' + client.name + ' ' + hasM + '</h3>';
                html += '    <p>ID: ' + id + '</p>';
                html += '    <div class="client-domains">🌐 ' + domains + '</div>';
                html += '  </div>';
                html += '  <div>';
                html += '    <button class="edit-btn" onclick="editClient(\\'' + id + '\\')">✏️ تعديل</button>';
                html += '    <button class="delete-btn" onclick="deleteClient(\\'' + id + '\\')">🗑️ حذف</button>';
                html += '  </div>';
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function editClient(id) {
            const client = clientsData[id];
            if (!client) return;
            document.getElementById('clientId').value = id;
            document.getElementById('clientName').value = client.name || '';
            document.getElementById('clientDomains').value = (client.domains || []).join(', ');
            document.getElementById('moyasarKey').value = client.moyasarPublishableKey || '';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function deleteClient(id) {
            if (!confirm("تأكيد الحذف للعميل " + id + "؟")) return;
            delete clientsData[id];
            saveAllData();
            showToast("تم الحذف بنجاح", "success");
        }

        function saveClient() {
            const id = document.getElementById('clientId').value.trim().toLowerCase();
            const name = document.getElementById('clientName').value.trim();
            const doms = document.getElementById('clientDomains').value.trim();
            const moyasar = document.getElementById('moyasarKey').value.trim();

            if (!id || !/^[a-z0-9-]+$/.test(id)) return showToast("المعرف غير صالح", "error");
            if (!name) return showToast("الاسم مطلوب", "error");

            let domainsArr = doms.split(',').map(d => d.trim()).filter(d => d);
            const cf = id + ".menu-app-cloudflare.pages.dev";
            if (!domainsArr.includes(cf)) domainsArr.push(cf);

            clientsData[id] = { name: name, domains: domainsArr };
            if (moyasar) clientsData[id].moyasarPublishableKey = moyasar;

            saveAllData();
            clearForm();
            showToast("تم حفظ العميل وتحميل الملفات", "success");
        }

        function saveAllData() {
            renderClients();

            // 1. Download clients.json
            downloadStrAsFile('clients.json', JSON.stringify(clientsData, null, 2));

            // 2. Download config.js
            const configStr = generateConfigContent();
            setTimeout(() => {
                downloadStrAsFile('config.js', configStr);
            }, 500);
        }

        function downloadStrAsFile(filename, text) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function generateConfigContent() {
            let entries = '';
            for (const key in clientsData) {
                const client = clientsData[key];
                let extras = '';
                if (client.moyasarPublishableKey) {
                    extras = ',\\n        moyasarPublishableKey: "' + client.moyasarPublishableKey + '"';
                }
                const doms = JSON.stringify(client.domains);
                entries += '    "' + key + '": {\\n        name: "' + client.name + '",\\n        domains: ' + doms + extras + '\\n    },\\n';
            }

            return '/* توليد تلقائي من الإدارة */\\n\\n' +
                'const CLIENTS_DATA = {\\n' +
                entries +
                '};\\n\\n' +
                'function detectClient() {\\n' +
                '    const hostname = window.location.hostname;\\n' +
                '    for (const [clientId, client] of Object.entries(CLIENTS_DATA)) {\\n' +
                '        if (client.domains.includes(hostname)) return { id: clientId, ...client };\\n' +
                '    }\\n' +
                '    const fallbackId = Object.keys(CLIENTS_DATA)[0] || "default";\\n' +
                '    return { id: fallbackId, ...(CLIENTS_DATA[fallbackId] || {}) };\\n' +
                '}\\n\\n' +
                'const CLIENT = detectClient();\\n' +
                'export { CLIENT, CLIENTS_DATA };\\n';
        }

        function clearForm() {
            document.getElementById('clientId').value = '';
            document.getElementById('clientName').value = '';
            document.getElementById('clientDomains').value = '';
            document.getElementById('moyasarKey').value = '';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        loadClients();
    </script>
</body>

</html>
